name: NAStool Docker
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build.yml

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4

      -
        name: Clone source from Gitee
        run: git clone --depth=1 -b master https://juway111:${{ secrets.GITEE_TOKEN }}@gitee.com/nobody114/123.git source

      -
        name: Copy dep files to build context
        run: |
          cp source/package_list.txt source/docker/
          cp source/requirements.txt source/docker/

      -
        name: Release version
        id: release_version
        run: |
          app_version=$(cat source/version.py | sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp")
          echo "app_version=$app_version" >> $GITHUB_ENV

      -
        name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      -
        name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      -
        name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      -
        name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: source/docker
          file: source/docker/Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/the-movies-tool:latest
            ${{ secrets.DOCKER_USERNAME }}/the-movies-tool:${{ env.app_version }}
